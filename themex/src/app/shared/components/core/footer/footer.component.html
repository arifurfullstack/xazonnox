@if (isVisible) {
  <div class="footer-xl-container">

    @switch (footerViews) {
      @case ('Footer 1') {
        <app-footer-xl-1 [shopInfo]="shopInfo"></app-footer-xl-1>
      }
      @case ('Footer 2') {
        <app-footer-xl-2 [shopInfo]="shopInfo"></app-footer-xl-2>
      }
      @case ('Footer 3') {
        <app-footer-xl-3 [shopInfo]="shopInfo"></app-footer-xl-3>
      }
      @default {
        <app-footer-xl-1 [shopInfo]="shopInfo"></app-footer-xl-1>
      }
    }


  </div>
  @if (showFooter) {
    @switch (bottomNavViews) {
      @case ('Bottom Nav 1') {
        <app-bottom-navbar [currentUrl]="currentUrl" [shopInfo]="shopInfo" [chatLink]="chatLink"></app-bottom-navbar>
      }
      @case ('Bottom Nav 2') {
        <!-- Pass tags for dynamic tag menu -->
        <app-bottom-navbar-2 [currentUrl]="currentUrl" [shopInfo]="shopInfo" [chatLink]="chatLink" [tags]="tags"></app-bottom-navbar-2>
      }

      @default {
        <app-bottom-navbar [currentUrl]="currentUrl" [shopInfo]="shopInfo" [chatLink]="chatLink"></app-bottom-navbar>
      }
    }
  }
  <app-social-chat [shopInfo]="shopInfo" [chatLink]="chatLink"></app-social-chat>
}
